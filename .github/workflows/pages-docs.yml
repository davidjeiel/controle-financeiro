name: Publicar demo e documentacao

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar demo React
        run: npm run build

      - name: Preparar pasta do GitHub Pages
        run: |
          mkdir -p docs
          find docs -mindepth 1 -maxdepth 1 ! -name CNAME -exec rm -rf {} +
          cp -R build/. docs/

      - name: Gerar documentacao doc-as-code
        run: npm run docs:build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
