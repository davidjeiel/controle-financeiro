name: Publicar demo e documentacao

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar demo React
        run: npm run build

      - name: Preparar pasta do GitHub Pages
        run: node scripts/prepare-pages.js

      - name: Gerar documentacao doc-as-code
        run: npm run docs:build

      - name: Versionar conteudo publicado em docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Nenhuma alteracao gerada para publicar."
          else
            git commit -m "chore: publish GitHub Pages [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
